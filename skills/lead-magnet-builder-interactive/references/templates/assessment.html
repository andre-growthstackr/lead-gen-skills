<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>{{TITLE}} — Assessment</title>
<style>
  :root {
    --bg: #faf7f2;
    --text: #1a1a1a;
    --accent: #ff6b6b;
    --muted: #6b6b6b;
    --border: #e5e0d8;
    --radius: 10px;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: 'Inter', sans-serif;
         background: var(--bg); color: var(--text); line-height: 1.5; }
  .container { max-width: 720px; margin: 0 auto; padding: 48px 24px; }
  h1 { font-size: 30px; font-weight: 600; margin: 0 0 8px; }
  h1 em { font-style: italic; color: var(--accent); }
  .step-indicator { font-size: 13px; color: var(--muted); margin-bottom: 24px; }
  .progress { height: 4px; background: var(--border); border-radius: 2px; margin: 8px 0 32px; }
  .progress-fill { height: 100%; background: var(--accent); transition: width .25s; }
  .step { display: none; }
  .step.active { display: block; }
  .form-group { margin-bottom: 20px; }
  label { display: block; font-weight: 500; margin-bottom: 8px; font-size: 16px; }
  .hint { font-size: 13px; color: var(--muted); margin-top: 4px; }
  input, textarea, select {
    width: 100%; padding: 12px 14px; border: 1px solid var(--border);
    border-radius: var(--radius); font-size: 16px; font-family: inherit;
    background: #fff;
  }
  textarea { min-height: 100px; resize: vertical; }
  .radio-group, .checkbox-group { display: flex; flex-direction: column; gap: 8px; }
  .radio-group label, .checkbox-group label {
    display: flex; align-items: center; gap: 10px; font-weight: normal;
    padding: 12px; border: 1px solid var(--border); border-radius: var(--radius);
    background: #fff; cursor: pointer;
  }
  .radio-group label:has(input:checked),
  .checkbox-group label:has(input:checked) {
    border-color: var(--accent); background: #fff5f5;
  }
  .nav { display: flex; justify-content: space-between; margin-top: 32px; }
  button {
    padding: 12px 24px; border: none; border-radius: var(--radius);
    font-size: 15px; font-weight: 500; cursor: pointer; font-family: inherit;
  }
  .btn-primary { background: var(--text); color: var(--bg); }
  .btn-primary:hover { background: var(--accent); }
  .btn-secondary { background: transparent; color: var(--muted); }
  .report { display: none; }
  .report.visible { display: block; }
  .report-section {
    padding: 24px; background: #fff; border: 1px solid var(--border);
    border-radius: var(--radius); margin-bottom: 16px;
  }
  .report-section h3 { margin-top: 0; color: var(--accent); }
</style>
</head>
<body>
<div class="container">
  <div id="assessment">
    <h1>Din personliga <em>{{ACCENT_WORD}}</em></h1>
    <div class="step-indicator">Steg <span id="current-step">1</span> av {{TOTAL_STEPS}}</div>
    <div class="progress"><div class="progress-fill" id="progress" style="width:14%"></div></div>

    <!-- STEG — duplicera blocket per steg, anpassa fält -->
    <div class="step active" data-step="1">
      <h2>{{STEP_1_TITLE}}</h2>
      <div class="form-group">
        <label for="q1">{{STEP_1_Q}}</label>
        <div class="radio-group">
          <label><input type="radio" name="q1" value="A" /> {{STEP_1_OPT_A}}</label>
          <label><input type="radio" name="q1" value="B" /> {{STEP_1_OPT_B}}</label>
          <label><input type="radio" name="q1" value="C" /> {{STEP_1_OPT_C}}</label>
        </div>
      </div>
    </div>

    <div class="step" data-step="2">
      <h2>{{STEP_2_TITLE}}</h2>
      <div class="form-group">
        <label for="q2">{{STEP_2_Q}}</label>
        <textarea name="q2" placeholder="{{STEP_2_PLACEHOLDER}}"></textarea>
      </div>
    </div>

    <!-- Lägg till fler steg upp till 4-8 totalt -->

    <div class="step" data-step="final">
      <h2>Få din rapport</h2>
      <div class="form-group">
        <label>Namn</label>
        <input type="text" name="name" required />
      </div>
      <div class="form-group">
        <label>Företag</label>
        <input type="text" name="company" />
      </div>
      <div class="form-group">
        <label>Email *</label>
        <input type="email" name="email" required />
        <div class="hint">Vi mejlar rapporten direkt + sparar den så du kan dela med teamet.</div>
      </div>
    </div>

    <div class="nav">
      <button class="btn-secondary" id="back" style="visibility:hidden">Tillbaka</button>
      <button class="btn-primary" id="next">Nästa</button>
    </div>
  </div>

  <div id="report" class="report">
    <h1>Din rapport: <em id="report-headline">—</em></h1>

    <div class="report-section">
      <h3>Din situation</h3>
      <p id="situation">—</p>
    </div>
    <div class="report-section">
      <h3>Dina svagheter</h3>
      <p id="weaknesses">—</p>
    </div>
    <div class="report-section">
      <h3>Dina åtgärder (top 3)</h3>
      <ol id="actions"></ol>
    </div>
    <div class="report-section">
      <h3>Nästa steg</h3>
      <p>{{NEXT_STEP_COPY}}</p>
      <a href="{{BOOK_URL}}"><button class="btn-primary">Boka 30 min med oss</button></a>
    </div>
  </div>
</div>

<script>
  const steps = document.querySelectorAll('.step');
  let currentIdx = 0;
  const totalSteps = steps.length;

  function showStep(idx) {
    steps.forEach((s, i) => s.classList.toggle('active', i === idx));
    document.getElementById('current-step').textContent = idx + 1;
    document.getElementById('progress').style.width = ((idx + 1) / totalSteps * 100) + '%';
    document.getElementById('back').style.visibility = idx > 0 ? 'visible' : 'hidden';
    document.getElementById('next').textContent =
      idx === totalSteps - 1 ? 'Generera min rapport' : 'Nästa';
  }

  document.getElementById('next').addEventListener('click', async () => {
    if (currentIdx < totalSteps - 1) {
      currentIdx++; showStep(currentIdx);
    } else {
      // samla svar
      const data = {};
      document.querySelectorAll('input, textarea, select').forEach(el => {
        if (el.type === 'radio') { if (el.checked) data[el.name] = el.value; }
        else if (el.type === 'checkbox') {
          if (!data[el.name]) data[el.name] = [];
          if (el.checked) data[el.name].push(el.value);
        }
        else data[el.name] = el.value;
      });

      if (!data.email || !data.email.includes('@')) return alert('Ange en giltig email');

      // RAPPORT-LOGIK — anpassa baserat på svar
      const headline = data.q1 === 'A' ? '{{HEADLINE_A}}' :
                       data.q1 === 'B' ? '{{HEADLINE_B}}' : '{{HEADLINE_C}}';
      const situation = '{{SITUATION_TEXT_BASED_ON_ANSWERS}}';
      const weaknesses = '{{WEAKNESS_TEXT_BASED_ON_ANSWERS}}';
      const actions = ['{{ACTION_1}}', '{{ACTION_2}}', '{{ACTION_3}}'];

      document.getElementById('assessment').style.display = 'none';
      document.getElementById('report').classList.add('visible');
      document.getElementById('report-headline').textContent = headline;
      document.getElementById('situation').textContent = situation;
      document.getElementById('weaknesses').textContent = weaknesses;
      document.getElementById('actions').innerHTML =
        actions.map(a => `<li>${a}</li>`).join('');

      // push till CRM
      try {
        await fetch('{{WEBHOOK_URL}}', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            ...data,
            lead_magnet: '{{LEAD_MAGNET_ID}}',
            report_headline: headline,
            submitted_at: new Date().toISOString()
          })
        });
      } catch (err) { console.error(err); }
    }
  });

  document.getElementById('back').addEventListener('click', () => {
    if (currentIdx > 0) { currentIdx--; showStep(currentIdx); }
  });
</script>
</body>
</html>
